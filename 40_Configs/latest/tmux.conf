# ペースト
# ----------------------------------------
# Shell
# ----------------------------------------
set-option -g default-shell /bin/zsh

# ----------------------------------------
# Basic
# ----------------------------------------
set -g mouse on
set -g history-limit 50000
set -g display-time 4000
set -g status-interval 5

# ----------------------------------------
# Copy&Paste
# ----------------------------------------
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -in"
bind -n MouseDown3Pane run-shell "tmux set-buffer \"$(xclip -selection clipboard -o)\"; tmux paste-buffer"

# ----------------------------------------
# Prefix
# ----------------------------------------
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# ----------------------------------------
# Splits
# ----------------------------------------
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# ----------------------------------------
# Reload
# ----------------------------------------
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# ----------------------------------------
# Logging path refresh
# ----------------------------------------
bind L display-message "logging-path: #{?@logging-path,#{@logging-path},not set}"

# ----------------------------------------
# Status bar
# ----------------------------------------
set -g status-bg black
set -g status-fg white
set -g status-left "#[fg=green]#S "
set -g status-right "#[fg=yellow]%Y-%m-%d %H:%M:%S"

# ----------------------------------------
# Plugins
# ----------------------------------------
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-logging'

# ログ保存先の初期値
set -g @logging-path "$HOME/Vault/Target/_tmp/log"

# ----------------------------------------
# TPM
# ----------------------------------------
run '~/.tmux/plugins/tpm/tpm'
